[theme]
# This sets the overall background to your dark purple
backgroundColor = "#301934"

# This changes the table background, dropdowns, and sidebar 
# I used a dusky pink here for readability. (For baby pink, use "#F4C2C2")
secondaryBackgroundColor = "#6A3859" 

# Keeps all your text white
textColor = "#FFFFFF"

# The accent color for checkboxes and buttons
primaryColor = "#FF69B4"